<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>りんごの紹介</title>
<style>
body{
  margin:0;
  font-family: sans-serif;
  background: linear-gradient(#ffe5e5,#ffffff);
  text-align:center;
}

header{
  padding:40px;
  font-size:40px;
  font-weight:bold;
}

.apple{
  font-size:80px;
  animation: float 3s ease-in-out infinite;
}

@keyframes float{
  0%{transform: translateY(0px);} 
  50%{transform: translateY(-20px);} 
  100%{transform: translateY(0px);} 
}

.section{
  margin:40px auto;
  width:80%;
  max-width:700px;
  padding:20px;
  border-radius:20px;
  background:white;
  box-shadow:0 10px 20px rgba(0,0,0,0.1);
  opacity:0;
  transform: translateY(40px);
  transition: all 0.8s;
}

.section.show{
  opacity:1;
  transform: translateY(0);
}

button{
  padding:12px 24px;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}

.fact{
  margin-top:20px;
  font-size:18px;
  display:none;
}
</style>
</head>
<body>

<header>🍎 りんごの世界 🍎</header>

<div class="apple">🍎</div>

<div class="section">
<h2>りんごとは？</h2>
<p>りんごは世界中で食べられている人気の果物です。甘さと酸っぱさのバランスがよく、ジュースやパイなどにも使われます。</p>
</div>

<div class="section">
<h2>りんごの栄養</h2>
<p>りんごには食物繊維やビタミンCが含まれており、健康に良いと言われています。</p>
</div>

<div class="section">
<h2>豆知識</h2>
<button onclick="showFact()">クリックして豆知識を見る</button>
<div class="fact" id="fact">世界には7,000種類以上のりんごがあります！</div>
</div>

<script>
const sections = document.querySelectorAll('.section');

window.addEventListener('scroll', () => {
  const trigger = window.innerHeight * 0.85;

  sections.forEach(section => {
    const top = section.getBoundingClientRect().top;

    if(top < trigger){
      section.classList.add('show');
    }
  });
});

function showFact(){
  const fact = document.getElementById('fact');
  fact.style.display = 'block';
}
</script>

</body>
</html>
