<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kengo | Profile</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:'Poppins',sans-serif;
  background: linear-gradient(120deg,#0f2027,#203a43,#2c5364);
  color:white;
  overflow-x:hidden;
}

header{
  height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
}

h1{
  font-size:64px;
  letter-spacing:4px;
  margin:0;
}

.subtitle{
  font-size:20px;
  opacity:0.8;
  margin-top:10px;
}

.scroll{
  margin-top:40px;
  font-size:14px;
  opacity:0.6;
  animation: float 2s infinite;
}

@keyframes float{
  0%{transform:translateY(0)}
  50%{transform:translateY(10px)}
  100%{transform:translateY(0)}
}

.section{
  max-width:900px;
  margin:80px auto;
  padding:40px;
  border-radius:20px;
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.08);
  box-shadow:0 10px 30px rgba(0,0,0,0.3);
  opacity:0;
  transform:translateY(40px);
  transition:0.8s;
}

.section.show{
  opacity:1;
  transform:translateY(0);
}

h2{
  margin-top:0;
  font-weight:500;
  letter-spacing:2px;
}

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit,minmax(200px,1fr));
  gap:20px;
  margin-top:20px;
}

.card{
  padding:20px;
  border-radius:16px;
  background: rgba(255,255,255,0.08);
  transition:0.3s;
}

.card:hover{
  transform:translateY(-8px) scale(1.03);
  background: rgba(255,255,255,0.18);
}

footer{
  text-align:center;
  padding:40px;
  opacity:0.6;
}
</style>
</head>
<body>

<header>
<h1>KENGO</h1>
<div class="subtitle">Welcome to my page</div>
<div class="scroll">Scroll ↓</div>
</header>

<div class="section">
<h2>About Me</h2>
<p>こんにちは、けんごです。このページは私の自己紹介ページです。Webデザインや新しいことを作ることに興味があります。</p>
</div>

<div class="section">
<h2>My Interests</h2>
<div class="grid">
<div class="card">🎬 映画</div>
<div class="card">💻 テクノロジー</div>
<div class="card">🎮 ゲーム</div>
<div class="card">🌏 新しい文化</div>
</div>
</div>

<div class="section">
<h2>Skills</h2>
<div class="grid">
<div class="card">HTML</div>
<div class="card">プレゼン</div>
<div class="card">英語学習</div>
</div>
</div>

<footer>
Kengo Profile Page
</footer>

<script>
const sections=document.querySelectorAll('.section');

window.addEventListener('scroll',()=>{
  const trigger=window.innerHeight*0.85;

  sections.forEach(section=>{
    const top=section.getBoundingClientRect().top;

    if(top<trigger){
      section.classList.add('show');
    }
  })
})
</script>

</body>
</html>
